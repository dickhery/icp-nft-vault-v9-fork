[package]
name = "backend"
version = "0.1.0"

[build]
outputDir = "dist"
args = [
  "--release",
  "--actor-idl=system-idl",
  "--enhanced-orthogonal-persistence",
  "--implicit-package=core",
  "-no-check-ir",
  "-A=M0198",
]

[canisters.backend]
main = "main.mo"

[canisters.collection_nft]
main = "collection_canister/main.mo"

[toolchain]
moc = "1.3.0"
lintoko = "0.7.0"

[lint]
extends = true

[moc]
args = [
  "--actor-idl=system-idl",
  "--enhanced-orthogonal-persistence",
  "--implicit-package=core",
  "-no-check-ir",
  "-A=M0198",
]

[dependencies]
core = "2.2.0"
